{% extends "layout.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card animate-up">
                <h2 class="mb-2">Event Configuration</h2>
                <p class="text-muted mb-5">Input event parameters to generate a staffing requirement analysis.</p>

                <form action="/predict" method="POST">
                    {% if error %}
                    <div class="alert alert-danger border-0 bg-danger text-white mb-4 animate-up" style="--bs-bg-opacity: 0.2; backdrop-filter: blur(10px);">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                    </div>
                    {% endif %}
                    
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">Event Type</label>
                            <select class="form-select" name="event_type" required>
                                <option value="Concert">Concert</option>
                                <option value="Sports">Sports Match</option>
                                <option value="Festival">Festival</option>
                                <option value="Political">Political Rally</option>
                                <option value="College Fest">College Fest</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Expected Crowd Size</label>
                            <input type="number" class="form-control" name="crowd_size" placeholder="e.g. 5000" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Venue Capacity</label>
                            <input type="number" class="form-control" name="venue_capacity" placeholder="e.g. 10000" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Duration (Hours)</label>
                            <input type="number" class="form-control" name="duration" min="1" max="24" value="4" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Entry Gates</label>
                            <input type="number" class="form-control" name="entry_gates" min="1" max="50" value="4" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Emergency Exits</label>
                            <input type="number" class="form-control" name="emergency_exits" min="1" max="50" value="4" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Incident Risk (1-10)</label>
                            <input type="number" class="form-control" name="incident_risk" min="1" max="10" value="3" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Weather Condition</label>
                            <select class="form-select" name="weather">
                                <option value="Sunny">Sunny</option>
                                <option value="Cloudy">Cloudy</option>
                                <option value="Rainy">Rainy</option>
                                <option value="Stormy">Stormy</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Day Type</label>
                            <select class="form-select" name="day_type">
                                <option value="Weekday">Weekday</option>
                                <option value="Weekend">Weekend</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Threat Level</label>
                            <select class="form-select" name="threat_level">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <div class="row g-3">
                                <div class="col-md-2">
                                    <div class="form-check form-switch">
                                        <input type="hidden" name="is_outdoor" value="0">
                                        <input class="form-check-input" type="checkbox" name="is_outdoor" value="1" id="outdoor">
                                        <label class="form-check-label" for="outdoor">Outdoor</label>
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <div class="form-check form-switch">
                                        <input type="hidden" name="vip_presence" value="0">
                                        <input class="form-check-input" type="checkbox" name="vip_presence" value="1" id="vip">
                                        <label class="form-check-label" for="vip">VIP Present</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check form-switch">
                                        <input type="hidden" name="is_holiday" value="0">
                                        <input class="form-check-input" type="checkbox" name="is_holiday" value="1" id="holiday">
                                        <label class="form-check-label" for="holiday">Public Holiday</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check form-switch">
                                        <input type="hidden" name="alcohol_allowed" value="0">
                                        <input class="form-check-input" type="checkbox" name="alcohol_allowed" value="1" id="alcohol">
                                        <label class="form-check-label" for="alcohol">Alcohol Allowed</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-5 text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">Generate AI Analysis</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
